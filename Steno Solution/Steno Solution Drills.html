<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Steno Jig</title>
	<link href="./data/style.css" rel="stylesheet" type="text/css">
	<link rel="stylesheet" type="text/css" href="./data/font-roboto.css">
	<script src="./data/util.js"></script>
</head>
<body>

<div class="wrapper">
	<h1 class="center title">Steno Jig</h1>

	<p class="welcome-text">This is a widget for stenography lessons: you can
	<a href="./data/learn-keyboard.html">learn the steno keyboard</a>, do <a
	href="./data/form.html">our lessons</a> or the <a
	href="./data/learn-plover.html">Learn Plover ones</a>, or fork the <a
	href="./data/https://github.com/JoshuaGrams/steno-jig">GitHub repo</a>
	and customize it to make your own.</p>
</div>

<script>
    function setTheme() {
        if (storageAvailable('localStorage')) {
            localStorage.theme = 'dark';  // Always use dark mode
            document.body.setAttribute('data-theme', 'dark');
        }
    }

    // Call setTheme on page load
    setTheme();

    if (storageAvailable('localStorage')) {
        let wrapper = document.querySelector('.wrapper');

        // Create the night mode toggle checkbox (although it will always be dark mode)
        let checkbox = document.createElement('input');
        checkbox.setAttribute('id', 'night-mode');
        checkbox.setAttribute('type', 'checkbox');
        checkbox.checked = true;  // Always checked (since it's always dark mode)

        // Add event listener to reflect changes in UI
        checkbox.addEventListener('input', function (e) {
            if (e.target.checked) {
                localStorage.theme = 'dark';
                document.body.setAttribute('data-theme', 'dark');
            } else {
                delete localStorage.theme;
                document.body.removeAttribute('data-theme');
            }
        });

        wrapper.appendChild(checkbox);

        let label = document.createElement('label');
        label.setAttribute('for', 'night-mode');
        label.appendChild(document.createTextNode(' Night Mode'));
        wrapper.appendChild(label);

        // Handle stats control logic
        const saveStats = localStorage.save_stats != null;
        const statsCtrl = N('input', {
            type: 'checkbox',
            click: (evt) => {
                if (statsCtrl.checked) localStorage.setItem('save_stats', 1);
                else localStorage.removeItem('save_stats');
            }
        });
        statsCtrl.checked = saveStats;
        N(wrapper, N('br'), N('label', statsCtrl, 'Record Stats'));

        if (localStorage.count) {
            linkExercises(localStorage, wrapper);
            listExercises(localStorage, wrapper);
        }
    } else {
        document.body.appendChild(document.createTextNode('localStorage not available.'));
    }

    // Redirect to "form.html" after the setup
    window.onload = function () {
        window.location.href = "./data/form.html";
    };
</script>
